<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Pixelboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
      user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #canvas-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      cursor: crosshair;
    }

    /* ── Toolbar ── */
    #toolbar {
      flex-shrink: 0;
      height: 52px;
      background: #0d0d0d;
      border-top: 1px solid #1f1f1f;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 12px;
      overflow-x: auto;
      overflow-y: hidden;
    }

    #toolbar::-webkit-scrollbar { display: none; }

    .swatch {
      width: 26px;
      height: 26px;
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
      border: 2px solid transparent;
      transition: transform 0.1s;
    }

    .swatch:hover { transform: scale(1.2); }
    .swatch.active { box-shadow: 0 0 0 2px #fff, 0 0 0 4px #333; }

    #divider {
      width: 1px;
      height: 28px;
      background: #1f1f1f;
      flex-shrink: 0;
      margin: 0 2px;
    }

    #color-input {
      width: 26px;
      height: 26px;
      border: 2px solid #2a2a2a;
      border-radius: 4px;
      cursor: pointer;
      background: none;
      padding: 0;
      flex-shrink: 0;
    }

    #eraser {
      width: 26px;
      height: 26px;
      border-radius: 4px;
      background: #1a1a1a;
      border: 2px solid #2a2a2a;
      color: #666;
      font-size: 0.8rem;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.1s;
    }

    #eraser:hover  { border-color: #555; color: #aaa; }
    #eraser.active { box-shadow: 0 0 0 2px #fff, 0 0 0 4px #333; }

    #hint {
      margin-left: auto;
      font-size: 0.6rem;
      color: #222;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #loader {
      position: fixed;
      inset: 0;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      color: #333;
      letter-spacing: 0.1em;
      z-index: 100;
    }
  </style>
</head>
<body>

  <div id="loader">loading pixels...</div>

  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>

  <div id="toolbar">
    <div id="palette"></div>
    <div id="divider"></div>
    <input type="color" id="color-input" value="#000000" title="Custom color" />
    <button id="eraser" title="Eraser">×</button>
    <span id="hint">click or drag to paint</span>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/gsap-public/minified/gsap.min.js"></script>
  <script>
    const gsap   = window.gsap;
    const socket = io();

    // ── Canvas setup ────────────────────────────────────────
    const GRID    = 100;
    const TOOLBAR = 52;
    const CELL    = Math.max(4, Math.floor(Math.min(window.innerWidth, window.innerHeight - TOOLBAR) / GRID));

    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    canvas.width  = GRID * CELL;
    canvas.height = GRID * CELL;

    const BG   = '#e8e8e8';
    const VOID = '#ffffff';

    // Draw grid background
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = VOID;
    for (let x = 0; x < GRID; x++)
      for (let y = 0; y < GRID; y++)
        ctx.fillRect(x*CELL+1, y*CELL+1, CELL-1, CELL-1);

    // Local pixel state
    const pixelData = new Map();

    function drawPixel(x, y, color) {
      pixelData.set(`${x},${y}`, color);
      ctx.fillStyle = color;
      ctx.fillRect(x*CELL+1, y*CELL+1, CELL-1, CELL-1);
    }

    // Flash effect for remote paints
    function remoteFlash(x, y, color) {
      const rect   = canvas.getBoundingClientRect();
      const scaleX = rect.width / canvas.width;
      const el     = document.createElement('div');
      const sz     = CELL * scaleX;
      el.style.cssText = `position:fixed;width:${sz}px;height:${sz}px;
        left:${rect.left + x*CELL*scaleX}px;top:${rect.top + y*CELL*scaleX}px;
        background:${color};pointer-events:none;z-index:10;`;
      document.body.appendChild(el);
      gsap.fromTo(el,
        { opacity: 0.75, scale: 1.6 },
        { opacity: 0, scale: 1, duration: 0.32, ease: 'power2.out', onComplete: () => el.remove() }
      );
    }

    // ── Socket events ────────────────────────────────────────
    const loader = document.getElementById('loader');

    socket.on('init', pixels => {
      pixels.forEach(({ x, y, color }) => drawPixel(x, y, color));
      gsap.to(loader, { opacity: 0, duration: 0.4, onComplete: () => loader.remove() });
      gsap.from('#toolbar', { y: 52, duration: 0.5, ease: 'power3.out', delay: 0.1 });
    });

    socket.on('paint', ({ x, y, color }) => {
      if (pixelData.get(`${x},${y}`) === color) return;
      drawPixel(x, y, color);
      remoteFlash(x, y, color);
    });

    // ── Painting ────────────────────────────────────────────
    let painting     = false;
    let currentColor = '#000000';

    function canvasPos(e) {
      const rect   = canvas.getBoundingClientRect();
      const scaleX = canvas.width  / rect.width;
      const scaleY = canvas.height / rect.height;
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      return {
        x: Math.floor((cx - rect.left) * scaleX / CELL),
        y: Math.floor((cy - rect.top)  * scaleY / CELL),
      };
    }

    function paint(e) {
      const { x, y } = canvasPos(e);
      if (x < 0 || x >= GRID || y < 0 || y >= GRID) return;
      if (pixelData.get(`${x},${y}`) === currentColor) return;
      drawPixel(x, y, currentColor);
      socket.emit('paint', { x, y, color: currentColor });
    }

    canvas.addEventListener('mousedown',  e => { painting = true; paint(e); });
    canvas.addEventListener('mousemove',  e => { if (painting) paint(e); });
    window.addEventListener('mouseup',    () => { painting = false; });

    canvas.addEventListener('touchstart', e => { painting = true; paint(e); e.preventDefault(); }, { passive: false });
    canvas.addEventListener('touchmove',  e => { if (painting) paint(e); e.preventDefault(); }, { passive: false });
    window.addEventListener('touchend',   () => { painting = false; });

    // ── Palette ──────────────────────────────────────────────
    const COLORS = [
      '#000000','#434343','#666666','#999999','#cccccc','#ffffff',
      '#ff0000','#e65c00','#ffaa00','#ffff00','#00cc44','#007700',
      '#00cccc','#0088ff','#0000ff','#6600cc','#cc00cc','#ff66cc',
      '#ff9999','#8B4513',
    ];

    const paletteEl  = document.getElementById('palette');
    const colorInput = document.getElementById('color-input');
    const eraserBtn  = document.getElementById('eraser');
    paletteEl.style.cssText = 'display:flex;gap:5px;align-items:center;';

    function selectColor(color, swatchEl) {
      currentColor = color;
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      eraserBtn.classList.remove('active');
      if (swatchEl) swatchEl.classList.add('active');
      colorInput.value = /^#[0-9a-fA-F]{6}$/.test(color) ? color : '#000000';
    }

    COLORS.forEach(color => {
      const s = document.createElement('div');
      s.className = 'swatch';
      s.style.background = color;
      if (color === '#000000') s.classList.add('active');
      s.addEventListener('click', () => selectColor(color, s));
      paletteEl.appendChild(s);
    });

    colorInput.addEventListener('input',  e => selectColor(e.target.value, null));
    colorInput.addEventListener('change', e => selectColor(e.target.value, null));

    eraserBtn.addEventListener('click', () => {
      currentColor = VOID;
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      eraserBtn.classList.add('active');
    });
  </script>
</body>
</html>
