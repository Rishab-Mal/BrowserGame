<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      color: #fff;
      user-select: none;
    }
    h1 { font-size: 2rem; letter-spacing: 0.3em; color: #4ade80; margin-bottom: 0.5rem; }
    #score { font-size: 1rem; color: #888; margin-bottom: 1rem; letter-spacing: 0.1em; }
    canvas {
      border: 2px solid #333;
      border-radius: 4px;
      display: block;
    }
    #msg {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #555;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <h1>SNAKE</h1>
  <div id="score">SCORE: 0</div>
  <canvas id="c" width="400" height="400"></canvas>
  <div id="msg">Press any arrow key or WASD to start</div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const msgEl = document.getElementById('msg');

    const GRID = 20;
    const COLS = canvas.width / GRID;
    const ROWS = canvas.height / GRID;

    let snake, dir, nextDir, food, score, running, loop;

    function init() {
      snake = [{ x: 10, y: 10 }];
      dir = { x: 0, y: 0 };
      nextDir = { x: 0, y: 0 };
      score = 0;
      running = false;
      scoreEl.textContent = 'SCORE: 0';
      msgEl.textContent = 'Press any arrow key or WASD to start';
      placeFood();
      draw();
    }

    function placeFood() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function tick() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = `SCORE: ${score}`;
        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function draw() {
      ctx.fillStyle = '#0f0f0f';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw subtle grid
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 0.5;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath(); ctx.moveTo(x * GRID, 0); ctx.lineTo(x * GRID, canvas.height); ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath(); ctx.moveTo(0, y * GRID); ctx.lineTo(canvas.width, y * GRID); ctx.stroke();
      }

      // Food
      ctx.fillStyle = '#f87171';
      ctx.beginPath();
      ctx.arc(food.x * GRID + GRID / 2, food.y * GRID + GRID / 2, GRID / 2 - 2, 0, Math.PI * 2);
      ctx.fill();

      // Snake
      snake.forEach((seg, i) => {
        const t = i / snake.length;
        ctx.fillStyle = i === 0 ? '#4ade80' : `hsl(${140 - t * 40}, 70%, ${55 - t * 15}%)`;
        ctx.beginPath();
        ctx.roundRect(seg.x * GRID + 1, seg.y * GRID + 1, GRID - 2, GRID - 2, 3);
        ctx.fill();
      });

      if (!running) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    }

    function gameOver() {
      clearInterval(loop);
      running = false;
      msgEl.textContent = `Game over! Score: ${score} — press any key to restart`;
      draw();
    }

    function start() {
      if (running) return;
      init();
      running = true;
      msgEl.textContent = '';
      loop = setInterval(tick, 120);
    }

    const DIRS = {
      ArrowUp: { x: 0, y: -1 }, w: { x: 0, y: -1 },
      ArrowDown: { x: 0, y: 1 }, s: { x: 0, y: 1 },
      ArrowLeft: { x: -1, y: 0 }, a: { x: -1, y: 0 },
      ArrowRight: { x: 1, y: 0 }, d: { x: 1, y: 0 },
    };

    document.addEventListener('keydown', e => {
      const d = DIRS[e.key];
      if (!d) return;
      e.preventDefault();
      if (!running) { start(); nextDir = d; return; }
      // Prevent reversing
      if (d.x === -dir.x && d.y === -dir.y) return;
      nextDir = d;
    });

    // Touch support
    let touchStart = null;
    canvas.addEventListener('touchstart', e => { touchStart = e.touches[0]; }, { passive: true });
    canvas.addEventListener('touchend', e => {
      if (!touchStart) return;
      const dx = e.changedTouches[0].clientX - touchStart.clientX;
      const dy = e.changedTouches[0].clientY - touchStart.clientY;
      let d;
      if (Math.abs(dx) > Math.abs(dy)) d = dx > 0 ? DIRS.ArrowRight : DIRS.ArrowLeft;
      else d = dy > 0 ? DIRS.ArrowDown : DIRS.ArrowUp;
      if (!running) { start(); nextDir = d; return; }
      if (d.x === -dir.x && d.y === -dir.y) return;
      nextDir = d;
    }, { passive: true });

    init();
  </script>
</body>
</html>
