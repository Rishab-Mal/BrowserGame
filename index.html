<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Pixelboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
      user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #canvas-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      cursor: crosshair;
    }

    /* ── Toolbar ── */
    #toolbar {
      flex-shrink: 0;
      height: 52px;
      background: #0d0d0d;
      border-top: 1px solid #1f1f1f;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 12px;
      overflow-x: auto;
      overflow-y: hidden;
    }

    #toolbar::-webkit-scrollbar { display: none; }

    .swatch {
      width: 26px;
      height: 26px;
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
      border: 2px solid transparent;
      transition: transform 0.1s;
    }

    .swatch:hover { transform: scale(1.2); }
    .swatch.active { box-shadow: 0 0 0 2px #fff, 0 0 0 4px #333; }

    #divider {
      width: 1px;
      height: 28px;
      background: #1f1f1f;
      flex-shrink: 0;
      margin: 0 2px;
    }

    #color-input {
      width: 26px;
      height: 26px;
      border: 2px solid #2a2a2a;
      border-radius: 4px;
      cursor: pointer;
      background: none;
      padding: 0;
      flex-shrink: 0;
    }

    #eraser {
      width: 26px;
      height: 26px;
      border-radius: 4px;
      background: #1a1a1a;
      border: 2px solid #2a2a2a;
      color: #666;
      font-size: 0.8rem;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.1s;
    }

    #eraser:hover { border-color: #555; color: #aaa; }
    #eraser.active { box-shadow: 0 0 0 2px #fff, 0 0 0 4px #333; }

    #hint {
      margin-left: auto;
      font-size: 0.6rem;
      color: #222;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #loader {
      position: fixed;
      inset: 0;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      color: #333;
      letter-spacing: 0.1em;
      z-index: 100;
    }
  </style>
</head>
<body>

  <div id="loader">loading pixels...</div>

  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>

  <div id="toolbar">
    <div id="palette"></div>
    <div id="divider"></div>
    <input type="color" id="color-input" value="#000000" title="Custom color" />
    <button id="eraser" title="Eraser">×</button>
    <span id="hint">click or drag to paint</span>
  </div>

  <script src="./gsap-public/minified/gsap.min.js"></script>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const gsap = window.gsap;

    const SUPABASE_URL = 'https://fnwijpyzupydilyezwmn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_JnINm8V2SsPlmLky6YMWKA_1KuDunPu';
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    // ── Canvas setup ────────────────────────────────────────
    const GRID    = 100;
    const TOOLBAR = 52;
    const CELL    = Math.max(4, Math.floor(Math.min(window.innerWidth, window.innerHeight - TOOLBAR) / GRID));

    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    canvas.width  = GRID * CELL;
    canvas.height = GRID * CELL;

    const BG   = '#e8e8e8'; // grid line color
    const VOID = '#ffffff'; // unpainted pixel color

    // Fill background (grid lines)
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Fill all pixels white
    ctx.fillStyle = VOID;
    for (let x = 0; x < GRID; x++) {
      for (let y = 0; y < GRID; y++) {
        ctx.fillRect(x*CELL+1, y*CELL+1, CELL-1, CELL-1);
      }
    }

    // Local pixel state
    const pixelData = new Map(); // 'x,y' → color

    function drawPixel(x, y, color) {
      pixelData.set(`${x},${y}`, color);
      ctx.fillStyle = color;
      ctx.fillRect(x*CELL+1, y*CELL+1, CELL-1, CELL-1);
    }

    // ── Load from DB ────────────────────────────────────────
    async function loadPixels() {
      const { data } = await db.from('pixels').select('x, y, color');
      (data || []).forEach(({ x, y, color }) => drawPixel(x, y, color));
    }

    // ── Painting ────────────────────────────────────────────
    let painting     = false;
    let currentColor = '#000000';
    const eraserColor = VOID;

    function canvasPos(e) {
      const rect   = canvas.getBoundingClientRect();
      const scaleX = canvas.width  / rect.width;
      const scaleY = canvas.height / rect.height;
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      return {
        x: Math.floor((cx - rect.left) * scaleX / CELL),
        y: Math.floor((cy - rect.top)  * scaleY / CELL),
      };
    }

    // Batch upserts
    const queue = new Map();
    let flushTimer = null;

    function queuePaint(x, y, color) {
      queue.set(`${x},${y}`, { x, y, color });
      clearTimeout(flushTimer);
      flushTimer = setTimeout(flush, 80);
    }

    async function flush() {
      const rows = [...queue.values()];
      queue.clear();
      if (!rows.length) return;
      await db.from('pixels').upsert(rows, { onConflict: 'x,y' });
    }

    function paint(e) {
      const { x, y } = canvasPos(e);
      if (x < 0 || x >= GRID || y < 0 || y >= GRID) return;
      if (pixelData.get(`${x},${y}`) === currentColor) return;
      drawPixel(x, y, currentColor);
      queuePaint(x, y, currentColor);
    }

    canvas.addEventListener('mousedown',  e => { painting = true; paint(e); });
    canvas.addEventListener('mousemove',  e => { if (painting) paint(e); });
    window.addEventListener('mouseup',    () => { if (painting) { painting = false; flush(); } });

    canvas.addEventListener('touchstart', e => { painting = true; paint(e); e.preventDefault(); }, { passive: false });
    canvas.addEventListener('touchmove',  e => { if (painting) paint(e); e.preventDefault(); }, { passive: false });
    window.addEventListener('touchend',   () => { if (painting) { painting = false; flush(); } });

    // ── Real-time ────────────────────────────────────────────
    function subscribe() {
      db.channel('pixels')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'pixels' }, ({ new: p }) => {
          if (!p || !p.x == null) return;
          // Skip if we already have this exact state locally (echo of own paint)
          if (pixelData.get(`${p.x},${p.y}`) === p.color) return;
          drawPixel(p.x, p.y, p.color);

          // Brief flash for remote paints
          const rect   = canvas.getBoundingClientRect();
          const scaleX = rect.width / canvas.width;
          const el = Object.assign(document.createElement('div'), {
            style: `position:fixed;width:${CELL*scaleX}px;height:${CELL*scaleX}px;
                    left:${rect.left + p.x*CELL*scaleX}px;top:${rect.top + p.y*CELL*scaleX}px;
                    background:${p.color};pointer-events:none;z-index:10;`
          });
          document.body.appendChild(el);
          gsap.fromTo(el, { opacity: 0.7, scale: 1.5 }, { opacity: 0, scale: 1, duration: 0.35, ease: 'power2.out', onComplete: () => el.remove() });
        })
        .subscribe();
    }

    // ── Palette ──────────────────────────────────────────────
    const COLORS = [
      '#000000','#434343','#666666','#999999','#cccccc','#ffffff',
      '#ff0000','#e65c00','#ffaa00','#ffff00','#00cc44','#007700',
      '#00cccc','#0088ff','#0000ff','#6600cc','#cc00cc','#ff66cc',
      '#ff9999','#8B4513',
    ];

    const paletteEl = document.getElementById('palette');
    paletteEl.style.cssText = 'display:flex;gap:5px;align-items:center;';

    function selectColor(color, swatchEl) {
      currentColor = color;
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      eraserBtn.classList.remove('active');
      if (swatchEl) swatchEl.classList.add('active');
      colorInput.value = color;
    }

    COLORS.forEach(color => {
      const s = document.createElement('div');
      s.className = 'swatch';
      s.style.background = color;
      s.title = color;
      if (color === '#000000') s.classList.add('active');
      s.addEventListener('click', () => selectColor(color, s));
      paletteEl.appendChild(s);
    });

    const colorInput = document.getElementById('color-input');
    colorInput.addEventListener('input', e => selectColor(e.target.value, null));
    colorInput.addEventListener('change', e => selectColor(e.target.value, null));

    const eraserBtn = document.getElementById('eraser');
    eraserBtn.addEventListener('click', () => {
      currentColor = eraserColor;
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      eraserBtn.classList.add('active');
    });

    // ── Boot ─────────────────────────────────────────────────
    const loader = document.getElementById('loader');
    await loadPixels();
    subscribe();
    gsap.to(loader, { opacity: 0, duration: 0.4, onComplete: () => loader.remove() });
    gsap.from('#toolbar', { y: 52, duration: 0.5, ease: 'power3.out', delay: 0.1 });
  </script>
</body>
</html>
